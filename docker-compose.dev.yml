# Dev compose: solo infraestructura (Postgres + Redis).
# La API corre en el host con `pnpm start:dev` para hot-reload nativo.

services:
  postgres:
    image: postgres:16-alpine
    container_name: moltech_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Si 5432 ya está en uso en el host, sobreescribir con POSTGRES_HOST_PORT=5434 (o el que esté libre)
      - '127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - moltech_dev

  redis:
    image: redis:7-alpine
    container_name: moltech_redis_dev
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1000', '--appendonly', 'yes']
    ports:
      # Sobreescribir con REDIS_HOST_PORT=6380 si 6379 está ocupado
      - '127.0.0.1:${REDIS_HOST_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - moltech_dev

volumes:
  postgres_data:
  redis_data:

networks:
  moltech_dev:
    driver: bridge
